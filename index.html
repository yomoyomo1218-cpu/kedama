        @keyframes floatGlow {
            0% { transform: translate(0px, 0px) scale(1); }
            50% { transform: translate(60px, -50px) scale(1.1); }
            100% { transform: translate(-40px, 40px) scale(0.95); }
        }
        /* Extra clean aesthetic cards */
        .minimal-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(226, 232, 240, 0.5);
            border-radius: 20px;
            box-shadow: 0 4px 30px rgba(148, 163, 184, 0.01);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);

        .minimal-card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 20px 40px -20px rgba(56, 189, 248, 0.1);

        /* Custom thin scrollbar */

    <script>
        // 背景色のエフェクト用変数
        let scrollHue = 210;

        // スクロールイベント
        window.addEventListener('scroll', () => {
            const scrollPercent = Math.min(window.scrollY / (document.documentElement.scrollHeight - window.innerHeight), 1);
            // 色の変化幅をより大きく設定 (200〜300の範囲で変化)
            scrollHue = 200 + (scrollPercent * 100);
        });

        // アニメーションループ (水が流れるように滑らかに変化させる)
        function animateBackground() {
            const time = Date.now() / 4000; 
            // 揺らぎの幅を大きく設定 (大げさに変化させるため * 40 に変更)
            const wave1 = Math.sin(time) * 40;
            const wave2 = Math.sin(time * 0.7) * 40;
            const currentHue = scrollHue + wave1 + wave2;
            
            document.body.style.backgroundColor = `hsl(${currentHue}, 60%, 94%)`;
            requestAnimationFrame(animateBackground);
        }
        
        // アニメーション開始
        animateBackground();

        // ビデオモーダル制御
        const modal = document.getElementById('video-modal');
        const iframe = document.getElementById('video-iframe');
        const closeBtn = document.getElementById('close-modal');

        document.querySelectorAll('.video-trigger').forEach(item => {
            item.addEventListener('click', () => {
                const videoId = item.getAttribute('data-video-id');
                iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
                modal.style.display = 'flex';
            });
        });

        const closeModal = () => {
            iframe.src = '';
            modal.style.display = 'none';
        };

        closeBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => { if(e.target === modal) closeModal(); });
    </script>
